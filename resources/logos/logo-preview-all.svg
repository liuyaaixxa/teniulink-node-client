<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="600" text-anchor="middle" fill="#18181B">teniulink Logo 设计方案</text>

  <!-- Row 1 -->
  <!-- Option 1: Light -->
  <rect x="30" y="70" width="340" height="70" rx="12" fill="#F4F4F5"/>
  <text x="200" y="115" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="500" text-anchor="middle" fill="#18181B">teniulink</text>

  <!-- Option 2: Dark -->
  <rect x="430" y="70" width="340" height="70" rx="12" fill="#000000"/>
  <text x="600" y="117" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="600" text-anchor="middle" fill="#FFFFFF" letter-spacing="3">TENIULINK</text>

  <!-- Row 2 -->
  <!-- Option 3: Split -->
  <rect x="30" y="170" width="340" height="70" rx="12" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1"/>
  <text x="200" y="215" font-family="Inter, -apple-system, sans-serif" font-size="24" text-anchor="middle">
    <tspan font-weight="300" fill="#71717A">teni</tspan><tspan font-weight="700" fill="#18181B">link</tspan>
  </text>

  <!-- Option 4: Abbreviation -->
  <rect x="430" y="170" width="340" height="70" rx="12" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1"/>
  <text x="600" y="220" font-family="Inter, -apple-system, sans-serif" font-size="40" font-weight="700" text-anchor="middle" fill="#18181B">tl</text>

  <!-- Row 3 -->
  <!-- Option 5: Mixed -->
  <rect x="30" y="270" width="340" height="70" rx="12" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1"/>
  <text x="200" y="316" font-family="Inter, -apple-system, sans-serif" font-size="28" text-anchor="middle">
    <tspan font-weight="700" fill="#18181B">TENIU</tspan><tspan font-weight="400" fill="#71717A">link</tspan>
  </text>

  <!-- Option 6: Dark Gray -->
  <rect x="430" y="270" width="340" height="70" rx="12" fill="#27272A"/>
  <text x="600" y="315" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" text-anchor="middle" fill="#FAFAFA">teniulink</text>

  <!-- Labels -->
  <text x="200" y="360" font-family="Inter, -apple-system, sans-serif" font-size="12" text-anchor="middle" fill="#71717A">方案1: 浅灰简洁</text>
  <text x="600" y="360" font-family="Inter, -apple-system, sans-serif" font-size="12" text-anchor="middle" fill="#71717A">方案2: 纯黑深色</text>
  <text x="200" y="380" font-family="Inter, -apple-system, sans-serif" font-size="12" text-anchor="middle" fill="#71717A">方案3: 分体风格</text>
  <text x="600" y="380" font-family="Inter, -apple-system, sans-serif" font-size="12" text-anchor="middle" fill="#71717A">方案4: 极简缩写</text>
  <text x="200" y="400" font-family="Inter, -apple-system, sans-serif" font-size="12" text-anchor="middle" fill="#71717A">方案5: 大小混合</text>
  <text x="600" y="400" font-family="Inter, -apple-system, sans-serif" font-size="12" text-anchor="middle" fill="#71717A">方案6: 深灰背景</text>

  <!-- Additional Icon-only versions -->
  <text x="400" y="450" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="#18181B">图标版本 (Icon Only)</text>

  <!-- Icon version 1 -->
  <rect x="100" y="470" width="80" height="80" rx="16" fill="#18181B"/>
  <text x="140" y="522" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#FFFFFF">T</text>

  <!-- Icon version 2 -->
  <rect x="200" y="470" width="80" height="80" rx="16" fill="#000000"/>
  <text x="240" y="522" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#FFFFFF" letter-spacing="2">TL</text>

  <!-- Icon version 3 -->
  <rect x="300" y="470" width="80" height="80" rx="16" fill="#2563EB"/>
  <text x="340" y="522" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" text-anchor="middle" fill="#FFFFFF">tn</text>

  <!-- Icon version 4 -->
  <rect x="400" y="470" width="80" height="80" rx="16" fill="#F4F4F5"/>
  <text x="440" y="522" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#18181B">T</text>

  <!-- Icon version 5 -->
  <rect x="500" y="470" width="80" height="80" rx="16" fill="url(#gradient1)"/>
  <text x="540" y="522" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#FFFFFF">T</text>

  <!-- Icon version 6 -->
  <rect x="600" y="470" width="80" height="80" rx="16" fill="#27272A"/>
  <text x="640" y="522" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" text-anchor="middle" fill="#FAFAFA">tn</text>

  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
</svg>
