<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="800" fill="#0A0A0A"/>

  <!-- 标题 -->
  <text x="500" y="45" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#FFFFFF">TU Logo 设计方案 - 科技/区块链风格</text>

  <!-- 方案1: 深蓝科技渐变 -->
  <g transform="translate(70, 80)">
    <rect width="280" height="280" rx="20" fill="#0F172A"/>
    <!-- 装饰网格 -->
    <g opacity="0.1" stroke="#3B82F6" stroke-width="0.5">
      <line x1="0" y1="70" x2="280" y2="70"/>
      <line x1="0" y1="140" x2="280" y2="140"/>
      <line x1="0" y1="210" x2="280" y2="210"/>
      <line x1="70" y1="0" x2="70" y2="280"/>
      <line x1="140" y1="0" x2="140" y2="280"/>
      <line x1="210" y1="0" x2="210" y2="280"/>
    </g>
    <text x="140" y="170" font-family="Inter, -apple-system, sans-serif" font-size="100" font-weight="700" text-anchor="middle" fill="url(#grad-blue)" filter="url(#glow)">TU</text>
    <text x="140" y="260" font-family="Inter, -apple-system, sans-serif" font-size="11" text-anchor="middle" fill="#64748B">TENIULINK</text>
  </g>

  <!-- 方案2: 工业黄 (区块链风格) -->
  <g transform="translate(360, 80)">
    <rect width="280" height="280" rx="20" fill="#1A1A1A"/>
    <!-- 六边形装饰 -->
    <g opacity="0.15" fill="none" stroke="#FFD600" stroke-width="1">
      <polygon points="140,40 180,60 180,100 140,120 100,100 100,60"/>
      <polygon points="140,160 180,180 180,220 140,240 100,220 100,180"/>
    </g>
    <text x="140" y="165" font-family="Inter, -apple-system, sans-serif" font-size="100" font-weight="700" text-anchor="middle" fill="#FFD600">TU</text>
    <text x="140" y="260" font-family="Inter, -apple-system, sans-serif" font-size="11" text-anchor="middle" fill="#52525B">TENIULINK</text>
  </g>

  <!-- 方案3: 极简白 -->
  <g transform="translate(650, 80)">
    <rect width="280" height="280" rx="20" fill="#18181B"/>
    <!-- 边框装饰 -->
    <rect x="20" y="20" width="240" height="240" rx="12" fill="none" stroke="#27272A" stroke-width="1"/>
    <text x="140" y="165" font-family="Inter, -apple-system, sans-serif" font-size="100" font-weight="700" text-anchor="middle" fill="#FFFFFF">TU</text>
    <text x="140" y="260" font-family="Inter, -apple-system, sans-serif" font-size="11" text-anchor="middle" fill="#71717A">TENIULINK</text>
  </g>

  <!-- 方案4: 青色脉冲 (赛博朋克) -->
  <g transform="translate(70, 400)">
    <rect width="280" height="280" rx="20" fill="#020617"/>
    <!-- 扫描线效果 -->
    <g opacity="0.1">
      <rect x="0" y="0" width="280" height="2" fill="#06B6D4"/>
      <rect x="0" y="70" width="280" height="1" fill="#06B6D4"/>
      <rect x="0" y="140" width="280" height="1" fill="#06B6D4"/>
      <rect x="0" y="210" width="280" height="1" fill="#06B6D4"/>
      <rect x="0" y="278" width="280" height="2" fill="#06B6D4"/>
    </g>
    <text x="140" y="165" font-family="Inter, -apple-system, sans-serif" font-size="100" font-weight="700" text-anchor="middle" fill="url(#grad-cyan)" filter="url(#glow-strong)">TU</text>
    <text x="140" y="260" font-family="Inter, -apple-system, sans-serif" font-size="11" text-anchor="middle" fill="#0E7490">TENIULINK</text>
  </g>

  <!-- 方案5: 紫色渐变 (Web3风格) -->
  <g transform="translate(360, 400)">
    <rect width="280" height="280" rx="20" fill="#0F0F0F"/>
    <!-- 渐变背景光晕 -->
    <circle cx="140" cy="140" r="100" fill="url(#grad-purple)" opacity="0.15"/>
    <text x="140" y="165" font-family="Inter, -apple-system, sans-serif" font-size="100" font-weight="700" text-anchor="middle" fill="url(#grad-purple)" filter="url(#glow)">TU</text>
    <text x="140" y="260" font-family="Inter, -apple-system, sans-serif" font-size="11" text-anchor="middle" fill="#7C3AED">TENIULINK</text>
  </g>

  <!-- 方案6: 翠绿链 (区块链节点) -->
  <g transform="translate(650, 400)">
    <rect width="280" height="280" rx="20" fill="#000000"/>
    <!-- 节点连接线 -->
    <g opacity="0.2" stroke="#10B981" stroke-width="1">
      <line x1="40" y1="60" x2="100" y2="100"/>
      <line x1="100" y1="100" x2="180" y2="80"/>
      <line x1="180" y1="80" x2="240" y2="120"/>
      <line x1="100" y1="100" x2="80" y2="180"/>
      <line x1="80" y1="180" x2="140" y2="220"/>
      <line x1="140" y1="220" x2="200" y2="200"/>
    </g>
    <!-- 节点 -->
    <g fill="#10B981" opacity="0.3">
      <circle cx="40" cy="60" r="4"/>
      <circle cx="100" cy="100" r="4"/>
      <circle cx="180" cy="80" r="4"/>
      <circle cx="240" cy="120" r="4"/>
      <circle cx="80" cy="180" r="4"/>
      <circle cx="140" cy="220" r="4"/>
      <circle cx="200" cy="200" r="4"/>
    </g>
    <text x="140" y="165" font-family="Inter, -apple-system, sans-serif" font-size="100" font-weight="700" text-anchor="middle" fill="url(#grad-green)" filter="url(#glow)">TU</text>
    <text x="140" y="260" font-family="Inter, -apple-system, sans-serif" font-size="11" text-anchor="middle" fill="#059669">TENIULINK</text>
  </g>

  <!-- 标签 -->
  <text x="500" y="770" font-family="Inter, -apple-system, sans-serif" font-size="12" text-anchor="middle" fill="#52525B">
    方案1: 深蓝科技  |  方案2: 工业黄  |  方案3: 极简白  |  方案4: 青色脉冲  |  方案5: 紫色渐变  |  方案6: 翠绿链
  </text>
</svg>