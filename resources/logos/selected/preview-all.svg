  <text x="600" y="215" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="700" text-anchor="middle" fill="#FFFFFF">tl</text>

  <!-- Icon versions -->
  <rect x="480" y="240" width="60" height="60" rx="12" fill="#18181B"/>
  <text x="510" y="282" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#FFFFFF">tl</text>

  <rect x="550" y="240" width="60" height="60" rx="12" fill="#2563EB"/>
  <text x="580" y="282" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#FFFFFF">tl</text>

  <rect x="620" y="240" width="60" height="60" rx="12" fill="#7C3AED"/>
  <text x="650" y="282" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#FFFFFF">tl</text>

  <rect x="690" y="240" width="60" height="60" rx="12" fill="#059669"/>
  <text x="720" y="282" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#FFFFFF">tl</text>

