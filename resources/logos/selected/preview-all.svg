  <text x="680" y="470" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="#FFFFFF">tl</text>

  <!-- Mixed icon -->
  <rect x="480" y="530" width="120" height="120" rx="24" fill="#18181B"/>
  <text x="540" y="590" font-family="Inter, -apple-system, sans-serif" font-size="36" text-anchor="middle">
    <tspan font-weight="700" fill="#FFFFFF">TENIU</tspan><tspan font-weight="400" fill="#A1A1AA">link</tspan>
  </text>

  <!-- Blue accent version -->
  <rect x="620" y="530" width="120" height="120" rx="24" fill="#2563EB"/>
  <text x="680" y="590" font-family="Inter, -apple-system, sans-serif" font-size="36" text-anchor="middle">
    <tspan font-weight="700" fill="#FFFFFF">TENIU</tspan><tspan font-weight="400" fill="#BFDBFE">link</tspan>
