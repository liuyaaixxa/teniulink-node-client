  <!-- 512x512 App Icons Preview -->
  <text x="600" y="380" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#52525B">App Icon 预览 (512x512)</text>

  <!-- Split icon -->
