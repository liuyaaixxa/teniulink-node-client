  </text>

  <!-- Icon version -->
  <rect x="30" y="530" width="60" height="60" rx="12" fill="#18181B"/>
  <text x="60" y="572" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#FFFFFF">T</text>

  <rect x="100" y="530" width="60" height="60" rx="12" fill="#2563EB"/>
  <text x="130" y="572" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="#FFFFFF">T</text>

