  <text x="540" y="465" font-family="Inter, -apple-system, sans-serif" font-size="32" text-anchor="middle">
    <tspan font-weight="300" fill="#A1A1AA">teni</tspan><tspan font-weight="700" fill="#FFFFFF">link</tspan>
  </text>

  <!-- Abbreviation icon -->
