<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <!-- Background -->
  <rect width="900" height="700" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="450" y="40" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#18181B">Teniulink Node Logo 选择方案</text>

  <!-- Option 3: Split Style -->
  <text x="150" y="90" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#52525B">方案3: 分体风格</text>

  <!-- Light version -->
  <rect x="30" y="100" width="240" height="60" rx="10" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1"/>
  <text x="150" y="140" font-family="Inter, -apple-system, sans-serif" font-size="22" text-anchor="middle">
    <tspan font-weight="300" fill="#71717A">teni</tspan><tspan font-weight="700" fill="#18181B">link</tspan>
  </text>

  <!-- Dark version -->
  <rect x="30" y="170" width="240" height="60" rx="10" fill="#18181B"/>
  <text x="150" y="210" font-family="Inter, -apple-system, sans-serif" font-size="22" text-anchor="middle">
    <tspan font-weight="300" fill="#A1A1AA">teni</tspan><tspan font-weight="700" fill="#FFFFFF">link</tspan>
  </text>

  <!-- Icon version -->
  <rect x="30" y="240" width="60" height="60" rx="12" fill="#18181B"/>
  <text x="60" y="280" font-family="Inter, -apple-system, sans-serif" font-size="24" text-anchor="middle">
    <tspan font-weight="300" fill="#A1A1AA">t</tspan><tspan font-weight="700" fill="#FFFFFF">l</tspan>
  </text>

  <!-- Option 4: Abbreviation -->
  <text x="600" y="90" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#52525B">方案4: 极简缩写</text>

