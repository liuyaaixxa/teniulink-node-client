<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="102" fill="#FFFFFF"/>
  <!-- 区块链节点连接 -->
  <g opacity="0.2" stroke="#10B981" stroke-width="1.5">
    <line x1="80" y1="100" x2="180" y2="180"/>
    <line x1="180" y1="180" x2="320" y2="140"/>
    <line x1="320" y1="140" x2="430" y2="200"/>
    <line x1="180" y1="180" x2="140" y2="320"/>
    <line x1="140" y1="320" x2="256" y2="400"/>
    <line x1="256" y1="400" x2="370" y2="360"/>
  </g>
  <g fill="#10B981" opacity="0.3">
    <circle cx="80" cy="100" r="6"/>
    <circle cx="180" cy="180" r="6"/>
    <circle cx="320" cy="140" r="6"/>
    <circle cx="430" cy="200" r="6"/>
    <circle cx="140" cy="320" r="6"/>
    <circle cx="256" cy="400" r="6"/>
    <circle cx="370" cy="360" r="6"/>
  </g>
  <text x="256" y="320" font-family="Inter, -apple-system, sans-serif" font-size="180" font-weight="700" text-anchor="middle" fill="url(#grad-green)" filter="url(#glow)">TU</text>
</svg>