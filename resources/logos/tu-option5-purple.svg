<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="102" fill="#0F0F0F"/>
  <circle cx="256" cy="256" r="180" fill="url(#grad-purple)" opacity="0.12"/>
  <text x="256" y="320" font-family="Inter, -apple-system, sans-serif" font-size="180" font-weight="700" text-anchor="middle" fill="url(#grad-purple)" filter="url(#glow)">TU</text>
</svg>