<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="102" fill="#020617"/>
  <!-- 扫描线 -->
  <g opacity="0.15">
    <rect x="0" y="0" width="512" height="3" fill="#06B6D4"/>
    <rect x="0" y="128" width="512" height="1" fill="#06B6D4"/>
    <rect x="0" y="256" width="512" height="1" fill="#06B6D4"/>
    <rect x="0" y="384" width="512" height="1" fill="#06B6D4"/>
    <rect x="0" y="509" width="512" height="3" fill="#06B6D4"/>
  </g>
  <text x="256" y="320" font-family="Inter, -apple-system, sans-serif" font-size="180" font-weight="700" text-anchor="middle" fill="url(#grad-cyan)" filter="url(#glow)">TU</text>
</svg>